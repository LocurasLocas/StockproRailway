<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StockPro — Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    :root { --brand: #6366f1; --brand-dark: #4f46e5; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sora', sans-serif; min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .particles { position: fixed; inset: 0; overflow: hidden; pointer-events: none; }
    .particle {
      position: absolute; width: 2px; height: 2px; background: rgba(99,102,241,.4);
      border-radius: 50%; animation: float linear infinite;
    }
    @keyframes float {
      from { transform: translateY(100vh) rotate(0deg); opacity: 1; }
      to { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }
    .card {
      background: rgba(255,255,255,.07); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.12); border-radius: 20px;
      padding: 2.5rem; width: 100%; max-width: 420px;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
      animation: slideUp .4s ease;
    }
    @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .logo { display: flex; align-items: center; gap: .85rem; margin-bottom: 2rem; justify-content: center; }
    .logo-icon {
      width: 52px; height: 52px; background: var(--brand); border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.3rem; box-shadow: 0 8px 24px rgba(99,102,241,.4);
    }
    .logo-text { font-size: 1.6rem; font-weight: 700; color: white; letter-spacing: -.02em; }
    .logo-text span { color: #a5b4fc; }
    .card h2 { color: white; font-size: 1.1rem; font-weight: 600; margin-bottom: .4rem; text-align: center; }
    .card p { color: rgba(255,255,255,.5); font-size: .85rem; text-align: center; margin-bottom: 1.75rem; }
    .form-group { margin-bottom: 1rem; }
    .form-label { display: block; color: rgba(255,255,255,.7); font-size: .8rem; font-weight: 600; margin-bottom: .4rem; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: .85rem; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,.3); font-size: .85rem; }
    .form-control {
      width: 100%; padding: .65rem .85rem .65rem 2.4rem;
      background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px; color: white; font-size: .875rem; font-family: 'Sora', sans-serif;
      transition: border-color .15s, background .15s;
    }
    .form-control::placeholder { color: rgba(255,255,255,.25); }
    .form-control:focus { outline: none; border-color: var(--brand); background: rgba(99,102,241,.1); }
    .remember { display: flex; align-items: center; gap: .5rem; color: rgba(255,255,255,.6); font-size: .8rem; margin-bottom: 1.25rem; }
    .remember input { accent-color: var(--brand); }
    .btn-login {
      width: 100%; padding: .75rem; background: var(--brand); color: white; border: none;
      border-radius: 10px; font-size: .9rem; font-weight: 600; font-family: 'Sora', sans-serif;
      cursor: pointer; transition: all .15s; box-shadow: 0 4px 16px rgba(99,102,241,.35);
      display: flex; align-items: center; justify-content: center; gap: .5rem;
    }
    .btn-login:hover { background: var(--brand-dark); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(99,102,241,.45); }
    .alert {
      background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5; padding: .65rem .85rem; border-radius: 8px; font-size: .82rem;
      margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem;
    }
    .hint { margin-top: 1.5rem; padding: 1rem; background: rgba(255,255,255,.04); border-radius: 8px; border: 1px solid rgba(255,255,255,.07); }
    .hint p { color: rgba(255,255,255,.35); font-size: .75rem; text-align: center; margin: 0; }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="card">
    <div class="logo">
      <div class="logo-icon"><i class="fas fa-boxes-stacked"></i></div>
      <span class="logo-text">Stock<span>Pro</span></span>
    </div>
    <h2>Bienvenido de nuevo</h2>
    <p>Ingresá tus credenciales para continuar</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert"><i class="fas fa-exclamation-circle"></i> {{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST">
      <div class="form-group">
        <label class="form-label">Usuario</label>
        <div class="input-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" name="username" class="form-control" placeholder="Tu nombre de usuario" required autofocus>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required>
        </div>
      </div>
      <label class="remember">
        <input type="checkbox" name="remember"> Recordarme
      </label>
      <button type="submit" class="btn-login">
        <i class="fas fa-right-to-bracket"></i> Ingresar
      </button>
    </form>
    <div class="hint">
      <p>Acceso inicial: <strong style="color:rgba(255,255,255,.5)">admin / admin123</strong></p>
    </div>
  </div>
  <script>
    const c = document.getElementById('particles');
    for(let i=0; i<30; i++){
      const p = document.createElement('div'); p.className='particle';
      p.style.left = Math.random()*100+'%';
      p.style.animationDuration = (6+Math.random()*12)+'s';
      p.style.animationDelay = (-Math.random()*15)+'s';
      p.style.width = p.style.height = (1+Math.random()*3)+'px';
      p.style.opacity = (.2+Math.random()*.6);
      c.appendChild(p);
    }
  </script>
</body>
</html>
